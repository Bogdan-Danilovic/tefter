<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Tefter — nema veze</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #f5f4f1; color: #1b1a18;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; text-align: center; padding: 2rem;
      }
      .mark {
        width: 56px; height: 56px; margin: 0 auto 1.25rem; border-radius: 14px;
        background: #1b1a18; color: #fff; display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 700;
      }
      h1 { font-size: 1.125rem; margin: 0 0 0.375rem; letter-spacing: -0.01em; }
      p { margin: 0; font-size: 0.875rem; color: #6f6b64; }
      button {
        margin-top: 1.25rem; border: 0; border-radius: 10px; background: #1b1a18; color: #fff;
        padding: 0.65rem 1.25rem; font-size: 0.875rem; font-weight: 500; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">T</div>
      <h1>Nema internet veze</h1>
      <p>Tefter trenutno radi samo uz vezu. Proveri mrežu pa probaj ponovo.</p>
      <button onclick="location.reload()">Pokušaj ponovo</button>
    </div>
  </body>
</html>
